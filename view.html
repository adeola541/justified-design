<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD | View All Work</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Navigation -->
    <nav class="navbar scrolled" style="background: rgba(5, 5, 5, 0.9);">
        <div class="logo">JD<span class="dot">.</span></div>
        <ul class="nav-links">
            <li><a href="index.html#home" class="nav-link">HOME</a></li>
            <li><a href="index.html#projects" class="nav-link">BACK TO QUEST LOG</a></li>
        </ul>
        <div class="nav-button">
            <a href="index.html#contact" class="btn primary-btn" data-text="CONTACT">CONTACT</a>
        </div>
    </nav>

    <!-- Main Content wrapper for smooth scrolling -->
    <div id="smooth-wrapper">
        <div id="smooth-content">
            
            <!-- Page Header Section -->
            <section class="section" style="padding-top: 10rem; min-height: auto;">
                <div class="container">
                    <h1 class="hero-title-small glitch-text" data-text="ALL QUESTS">ALL QUESTS</h1>
                    <p class="hero-desc" style="max-width: 800px; margin-top: 1rem;">A complete archive of all main projects and design explorations.</p>
                </div>
            </section>

            <!-- Projects Grid Section -->
            <section id="related-quests" class="projects section" style="padding-top: 2rem;">
                <div class="container">
                    
                    <div class="portfolio-filters" style="display: flex; gap: 1rem; margin-bottom: 3rem; justify-content: center; flex-wrap: wrap;">
                        <button class="filter-btn active btn secondary-btn btn-small" data-filter="All">All</button>
                        <button class="filter-btn btn secondary-btn btn-small" data-filter="Real Project">Real Project</button>
                        <button class="filter-btn btn secondary-btn btn-small" data-filter="Exploration">Exploration</button>
                    </div>

                    <div id="dyn-view-all-content">
                        <!-- Grouped results will be injected here -->
                    </div>
                </div>
            </section>

            <footer>
                <div class="footer-content">
                    <div class="logo">JD<span class="dot">.</span></div>
                    <p>SYSTEM OFFLINE. &copy; 2026 JUSTIFIED DESIGN.</p>
                </div>
            </footer>
        </div>
    </div>

    <!-- Lenis for smooth scrolling -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <!-- Custom Scripts -->
    <script>
        function renderAllProjects() {
            const stored = localStorage.getItem('jd_projects');
            const projects = stored ? JSON.parse(stored) : [];
            const container = document.getElementById('dyn-view-all-content');
            
            if (!projects.length) {
                container.innerHTML = `<p style="text-align:center; color: #888; padding: 4rem;">No projects found. Add them in the Admin Dashboard.</p>`;
                return;
            }

            const realProjects = projects.filter(p => p.category === 'Real Project');
            const explorations = projects.filter(p => p.category === 'Exploration');

            let html = '';

            if (realProjects.length > 0) {
                html += `
                    <div class="category-block" data-cat="Real Project" style="margin-bottom: 6rem;">
                        <div class="section-header" style="margin-bottom: 2rem;">
                            <h2 class="section-title" style="font-size: 1.5rem; color: var(--neon-cyan);">[ REAL PROJECTS ]</h2>
                            <div class="section-line"></div>
                        </div>
                        <div class="projects-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                            ${realProjects.map((p, i) => renderCard(p, i+1)).join('')}
                        </div>
                    </div>
                `;
            }

            if (explorations.length > 0) {
                html += `
                    <div class="category-block" data-cat="Exploration">
                        <div class="section-header" style="margin-bottom: 2rem;">
                            <h2 class="section-title" style="font-size: 1.5rem; color: var(--neon-magenta);">[ EXPLORATIONS ]</h2>
                            <div class="section-line"></div>
                        </div>
                        <div class="projects-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                            ${explorations.map((p, i) => renderCard(p, i+1)).join('')}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            
            // Re-init Tilt
            if(typeof VanillaTilt !== 'undefined') VanillaTilt.init(document.querySelectorAll(".tilt-card"), { max: 15, speed: 400 });
        }

        function renderCard(p, index) {
            return `
                <div class="node-content glass-panel tilt-card project-card" data-category="${p.category}" data-tilt style="margin: 0; padding: 2.5rem; border: 1px solid rgba(16, 185, 129, 0.2);">
                    <div class="project-badge ${p.category === 'Real Project' ? 'badge-real' : 'badge-exploration'}">
                        <i class="fas ${p.category === 'Real Project' ? 'fa-check-circle' : 'fa-vial'}"></i> ${p.category}
                    </div>
                    <div class="gallery-item" style="height: 180px; margin-bottom: 1.5rem; overflow:hidden; border-radius:4px; border:1px solid rgba(255,255,255,0.05);">
                        <img src="${p.img}" alt="${p.title}" class="project-thumb" style="width:100%; height:100%; object-fit:cover; margin-bottom: 0;">
                    </div>
                    <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">${index}. ${p.title}</h3>
                    <p style="color: #bbb; line-height: 1.6; margin-bottom: 2rem;">${p.desc}</p>
                    <a href="${p.link}?id=${p.id}" class="btn secondary-btn btn-small" data-text="View Details">View Details</a>
                </div>
            `;
        }

        function initFilters() {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => {
                        b.classList.remove('active');
                        b.style.background = 'transparent';
                        b.style.color = 'var(--text-color)';
                    });
                    btn.classList.add('active');
                    btn.style.background = 'var(--neon-cyan)';
                    btn.style.color = '#000';

                    const filter = btn.getAttribute('data-filter');
                    document.querySelectorAll('.category-block').forEach(block => {
                        if (filter === 'All' || block.getAttribute('data-cat') === filter) {
                            block.style.display = 'block';
                        } else {
                            block.style.display = 'none';
                        }
                    });
                });
            });
        }

        renderAllProjects();
        initFilters();
    </script>
</body>
</html>
